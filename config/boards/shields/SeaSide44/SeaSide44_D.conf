# キーボード名設定
CONFIG_ZMK_KEYBOARD_NAME="SeaSide44"

# スプリット設定
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# USB優先（ドングルはUSB接続が主）
CONFIG_ZMK_USB=y

# ZMK Studio有効化
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# 接続安定性向上
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_CTLR_PHY_2M=n

# 入力デバイスのサポートを有効化
CONFIG_INPUT=y

# ポインティングデバイス
CONFIG_SPI=y

# マウスサポート
CONFIG_ZMK_MOUSE=y

# 自動マウスレイヤー切り替え
CONFIG_ZMK_INPUT_PROCESSOR_TEMP_LAYER=y

# CPI除数の設定
CONFIG_PMW3610_CPI_DIVIDOR=1
# トラックボールの向きを180度回転
CONFIG_PMW3610_ORIENTATION_180=y
# スクロールの感度設定
CONFIG_PMW3610_SCROLL_TICK=12
# X軸の動きを反転しない
CONFIG_PMW3610_INVERT_X=n
# X軸スクロールの動きを反転
CONFIG_PMW3610_INVERT_SCROLL_X=y
# ポーリングレートを125Hzに設定
# CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_POLLING_RATE_250=y
# スマートアルゴリズム（動きの補正機能）の有効化
CONFIG_PMW3610_SMART_ALGORITHM=y

# ログ出力（デバッグ用、必要に応じて有効化）
# CONFIG_ZMK_USB_LOGGING=y
# CONFIG_LOG_LEVEL_DBG=y